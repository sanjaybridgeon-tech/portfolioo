spring.application.name=portfolio-backend
# Set to 'prod' if you're deploying, 'dev' for local testing
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Database Configuration (Overrides via Environment Variables on Render)
# Local fallback: jdbc:postgresql://localhost:5432/portfolio_db
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/portfolio_db?sslmode=require}
spring.datasource.username=${DB_USERNAME:sanjaya}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# HikariCP Connection Pool (Recommended for Production)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=30000

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration
management.endpoints.web.exposure.include=health,info
